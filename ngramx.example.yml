version: "1.0"

docker:
  compose_file: "docker-compose.yml"
  primary_service: "app"
  wait_for:
    - service: "db"
      timeout: 60
    - service: "redis"
      timeout: 30
    # Real readiness probe for the app: tried in order healthcheck ->
    # ready_command -> ready_log. Falls back to "running" if none are set.
    - service: "app"
      timeout: 300
      healthcheck: true
      ready_command: "php artisan --version"
      ready_log: "is ready!"

setup:
  pre_start:
    - command: "[ ! -f .env ] && cp .env.example .env || true"
      description: "Create environment file if it doesn't exist"
      ignore_failure: true
      
  initialize:
    - command: "composer install --no-interaction"
      description: "Install PHP dependencies"
      retry: 2
      timeout: 300
      
    - command: "php artisan migrate:fresh --seed --force"
      description: "Setup database"
      ignore_failure: false

commands:
  test:
    command: "php artisan test"
    description: "Run test suite"
    
  shell:
    command: "bash"
    description: "Open shell in container"
    
  fresh_db:
    command: "php artisan migrate:fresh --seed"
    description: "Reset database with fresh data"

  # Providing a list under `command:` runs every entry concurrently inside
  # the container. A live panel shows `<label>: <last log line>` for each
  # running command; each row disappears when that command finishes. The
  # overall command succeeds only if all sub-commands succeed.
  validate:
    command:
      - "composer validate --strict"
      - "vendor/bin/phpstan analyse src tests --level=8"
      - "vendor/bin/phpunit"
    description: "Run composer, phpstan and phpunit in parallel"
    timeout: 180

# Optional: control where Ngramx writes its managed agent instructions and skills.
# `ngramx sync-agents` (and `ngramx up`) regenerate these from the bundled templates.
# Both `targets` (rules) and `skills` respect the lists below — omit the whole
# `agents:` block to accept the defaults shown here.
agents:
  # Where the managed rule/instruction content is written.
  # Valid: agents_md, cursor_rules, claude_md, copilot_instructions
  # Default: [agents_md, cursor_rules]
  targets:
    - agents_md             # AGENTS.md (managed block, read by most agents)
    - cursor_rules          # .cursor/rules/ngramx.mdc
    - claude_md             # CLAUDE.md (add this to distribute rules to Claude)
    - copilot_instructions  # .github/copilot-instructions.md

  # Where skill folders (start-ticket, create-pr, …) are copied.
  # Valid: cursor, claude
  # Default: [cursor]
  skills:
    - cursor                # .cursor/skills/<name>/SKILL.md
    - claude                # .claude/skills/<name>/SKILL.md

