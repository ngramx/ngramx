version: "1.0"

docker:
  compose_file: "docker-compose.test.yml"
  primary_service: "app"
  app_url: "http://localhost:8080"
  wait_for:
    - service: "app"
      timeout: 30

secrets:
  provider: env
  required:
    - NOVA_ACCOUNT_EMAIL
    - NOVA_LICENSE_KEY

setup:
  pre_start:
    - command: "composer config http-basic.nova.laravel.com $NOVA_ACCOUNT_EMAIL $NOVA_LICENSE_KEY"
      description: "Configure Nova authentication"

  initialize:
    - command: "echo 'Initialize command executed'"
      description: "Test initialize command"
      timeout: 120

commands:
  test:
    command: "echo 'Running tests'"
    description: "Run test suite"
